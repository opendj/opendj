# Prod Env is running in employee openshift
# with ACME Certs
# frontend used artifact image, because runtime image requires root
# privileges where are not avail on employee openshift:
specific:
  COMMON:
    DNS_BASENAME: "www.opendj.io"
#    DNS_ADDITIONAL_NAMES: 
#    - prd2.opendj.io
    CONTAINER:
      IMAGE_TAG: "0.8.1"
      PULL_POLICY: IfNotPresent

    K8S:
      KUBECONFIG: "/Users/dfroehli/RedHat/projects/OpenDJ/secret_prd1tunnel_kubeconfig.yml"

    CERTMGR:
      EMAIL: "cto@opendj.io"
# For Non-PROD:
#      SERVER: "https://acme-staging-v02.api.letsencrypt.org/directory"
  # For PROD:
      SERVER: "https://acme-v02.api.letsencrypt.org/directory"

  BACKEND_DATAGRID:
    REPLICAS: 1

  BACKEND_EVENTSTORE:
    REPLICAS: 1

  PROVIDER_SPOTIFY:
    LOG_LEVEL: "error"
    SPOTIFY_CALLBACK_URL: "https://www.opendj.io/api/provider-spotify/v1/auth_callback"
    REPLICAS: 1

  SERVICE_HOUSEKEEPING:
    LOG_LEVEL: "error"

  SERVICE_PLAYLIST:
    REPLICAS: 1
    LOG_LEVEL: "info"
    TEST_EVENT_CREATE: "true"
    TEST_EVENT_ID: "demo"
    DEFAULT_AUTOFILL_EMPTY_PLAYLIST: "false"
    DEFAULT_IS_PLAYING: "true"
    MOCKUP_NO_ACTUAL_PLAYING: "false"
    MOCKUP_AUTOSKIP_SECONDS: "0"
    INTERNAL_POLL_INTERVAL: "5000"
    EVENT_URL: "www.opendj.io"

  SERVICE_WEB:
    REPLICAS: 1
    LOG_LEVEL: "error"

  SERVICE_EVENTACTIVITY:
    REPLICAS: 1
    LOG_LEVEL: "ERROR"

  FRONTEND_WEB:
    REPLICAS: 1
    USE_ACME_CERTS: "true"
    SERVER_TIMEOUT: "10000"
  