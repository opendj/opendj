
# Common variables
# HEADS UP: Due to limitation of variable parsing, you cant
# use a variable defined here also in this file.
# So certain values might occur redudant!
# Be sure to search for them and replace ALL occurences!
common:
  COMMON:
    NAMESPACE: "opendj-{{ STAGE | mandatory}}"
# Remember to change Callback and Event URL below, too:
    DNS_BASENAME: "{{STAGE}}.opendj.io"
    CONTAINER:
      IMAGE_TAG: "{{STAGE}}"
      IMAGE_REGISTRY: "quay.io/opendj"
      PULL_POLICY: IfNotPresent
    K8S:
      KUBECONFIG: "/Users/dfroehli/RedHat/projects/OpenDJ/secret_{{STAGE}}_kubeconfig.yml"
      INGRESSCLASS: "openshift-ingress"
      STORAGE_CLASS_FILE: "topolvm-provisioner"
      INGRESS_TLS_SECRET: "{{STAGE}}.opendj.io.tls"
    CERTMGR:
      DEPLOY: true
      EMAIL: "daniel.froehlich@web.de"
# For Non-PROD:
#      SERVER: "https://acme-staging-v02.api.letsencrypt.org/directory"
  # For PROD:
      SERVER: "https://acme-v02.api.letsencrypt.org/directory"
    NODEJS:
      MAX_OLD_SPACE_FACTOR: 0.75


  BACKEND_EVENTSTORE:
    DEPLOY: true
    REPLICAS: 2
    KAFKA:
      HOST: "backend-eventstore-kafka-bootstrap:9092"
      USE: true
      NUM_PARTITIONS: 1
    LIMIT_CPU: "1000m"
    LIMIT_MEMORY: 768
    STORAGE_SIZE: "1Gi"

  BACKEND_DATAGRID:
    DEPLOY: true
    URL: "backend-datagrid:11222"
    LIMIT_CPU: "1000m"
    LIMIT_MEMORY: "512Mi"
    STORAGE_SIZE: "1Gi"
# Does not work due to string to int type mismatch:
#    REPLICAS: 2

  PROVIDER_SPOTIFY:
    DEPLOY: true
    SPOTIFY_CALLBACK_URL: "https://{{STAGE}}.opendj.io/api/provider-spotify/v1/auth_callback"
    SPOTIFY_CLIENT_ID: "{{VAULT_SPOTIFY_CLIENT_ID}}"
    SPOTIFY_CLIENT_SECRET: "{{VAULT_SPOTIFY_CLIENT_SECRET}}"
    GRID_RETRY_INTERVAL_MS: 1000
    GRID_RETRY_MAX: 10
    CPU_REQUEST: "100m"
    MEM_REQUEST_MI: "128"

  SERVICE_PLAYLIST:
    DEPLOY: true
    EVENT_URL: "{{STAGE}}.opendj.io"
    GRID_RETRY_INTERVAL_MS: 1000
    GRID_RETRY_MAX: 10
    CPU_REQUEST: "100m"
    MEM_REQUEST_MI: "128"

  SERVICE_WEB:
    DEPLOY: true
    THROTTLE_EMITTER_PLAYLIST: 5000
    GRID_RECONNECT_INTERVAL: 300
    EMIT_ACTIVITY: "true"
    CPU_REQUEST: "100m"
    MEM_REQUEST_MI: "128"

  SERVICE_HOUSEKEEPING:
    DEPLOY: true
    CRONTAB: "0,30 * * * * *"
    CPU_REQUEST: "50m"
    MEM_REQUEST_MI: "96"

  SERVICE_EVENTACTIVITY:
    REPLICAS: 2
    PROVIDER_URL: "http://service-eventactivity:8080/api/service-eventactivity/v1/"
    DEPLOY: true
    CPU_REQUEST: "100m"
    CPU_LIMIT: "250m"
    MEM_REQUEST_MI: "128"
    MEM_LIMIT_MI: "196"


  FRONTEND_WEB:
    DEPLOY: true
# Do not specific host - use relative hostname to allow switch between http/https:
    WEBSOCKET_HOST: ""
    API_HOST: ""
    SERVER_TIMEOUT: "5000"
    INSECURE_EDGE_TERMINATION: "Allow"
    SPOTIFY_CALLBACK_URL: "https://{{STAGE}}.opendj.io/api/provider-spotify/v1/auth_callback"
    USE_RUNTIME_IMAGE: true
    CPU_REQUEST: "50m"
    CPU_LIMIT: "250m"
    MEM_REQUEST_MI: "32"
    MEM_LIMIT_MI: "96"
